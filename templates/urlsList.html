<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>urls-List</title>
</head>
<body>
    <div>
        <h1>Shortened Url List</h1>
        <div>
            <a href="http://127.0.0.1:5000/">Add </a>
        </div>
        <hr>
        {% for url in urls %}
            <div>
                <div>
                    <strong>{{ url.id }}</strong>
                </div>
                <p>Original URL: <a href="{{ url.original_url }}">{{ url.original_url }}</a></p>
                <p>shortened URL: <a href="{{ url }}">{{ url.shortened_url }}</a></p>
                <hr>
            </div>
        {% endfor %}
    </div>
</body>
</html>
